name: Sync from Upstream (Skip .github)

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # needed for some checkout actions; safe here

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      # Checkout GitHub repository
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Configure git
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      # Add upstream remote and fetch
      - name: Add upstream
        run: |
          git remote add upstream https://git.centerionware.com/0xdeadc0de/evmon.git
          git fetch upstream

      # Merge all upstream changes except .github
      - name: Merge upstream (skip .github)
        run: |
          # Determine upstream default branch
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          # Create temp directory for upstream
          TMPDIR=$(mktemp -d)
          git clone --branch $UPSTREAM_BRANCH --depth 1 https://git.centerionware.com/0xdeadc0de/evmon.git "$TMPDIR"

          # Copy everything except .github
          rsync -av --exclude='.github' "$TMPDIR/" .

          # Clean up
          rm -rf "$TMPDIR"

          # Add all changes
          git add .

          # Commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Sync from upstream (skipping .github folder)"
          else
            echo "No changes to commit"
            exit 0
          fi

      # Push changes to GitHub main
      - name: Push to GitHub
        run: |
          git push origin main
