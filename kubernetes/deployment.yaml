apiVersion: apps/v1
kind: Deployment
metadata:
  name: evmon
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evmon
  template:
    metadata:
      labels:
        app: evmon
    spec:
      serviceAccountName: evmon
      containers:
        - name: evmon
          image: ghcr.io/centerionware/evmon:latest
          imagePullPolicy: Always
          env:
            # Example: Postgres connection string for production
            - name: EVMON_DATABASE_URL
              value: "postgres://user:pass@postgres:5432/evmon?sslmode=disable"
          ports:
            - containerPort: 8080